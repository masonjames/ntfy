name: build
on:
  push:
    branches: [ main ]
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: '.go-version'
      - name: Install node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: './web/package-lock.json'
      - name: Install dependencies
        run: make build-deps-ubuntu
      - name: Build all the things
        run: make build
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v3.12.0
      - name: Build the deployment image without publishing
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v6.19.2
        with:
          context: .
          file: ./Dockerfile-build
          push: false
          platforms: linux/amd64
          build-args: |
            VERSION=ci-${{ github.sha }}
            COMMIT=${{ github.sha }}
            SOURCE_URL=https://github.com/${{ github.repository }}
          provenance: false
          sbom: false
      - name: Print build results and checksums
        run: make cli-build-results
