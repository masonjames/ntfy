name: Build, attest, and release ntfy

on:
  push:
    branches: [main]
  schedule:
    # One of these is 03:20 America/New_York in either EDT or EST. The
    # maintenance gate rejects the other invocation.
    - cron: '20 7 * * 0'
    - cron: '20 8 * * 0'
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy the built digest outside the routine schedule
        type: boolean
        default: true

permissions: {}

concurrency:
  group: ntfy-immutable-release
  cancel-in-progress: false

jobs:
  build:
    name: Build immutable candidate
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
      immutable_image: ${{ steps.immutable.outputs.image }}
      source_sha: ${{ steps.source.outputs.sha }}
    steps:
      - name: Checkout exact source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Verify source provenance
        id: source
        env:
          CLAIMED_SOURCE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          actual_source_sha=$(git rev-parse HEAD)
          [[ "$CLAIMED_SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]]
          [ "$actual_source_sha" = "$CLAIMED_SOURCE_SHA" ]
          echo "sha=$actual_source_sha" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v3.12.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Prepare immutable image metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v5.10.0
        with:
          images: ghcr.io/masonjames/ntfy
          tags: |
            type=raw,value=${{ steps.source.outputs.sha }}
            type=raw,value=sha-${{ steps.source.outputs.sha }}

      - name: Build and push immutable image
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v6.19.2
        with:
          context: .
          file: ./Dockerfile-build
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            VERSION=upstream-main-${{ steps.source.outputs.sha }}
            COMMIT=${{ steps.source.outputs.sha }}
            SOURCE_URL=https://github.com/masonjames/ntfy
          provenance: mode=max
          sbom: true

      - name: Resolve immutable digest reference
        id: immutable
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          [[ "$IMAGE_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]
          echo "image=ghcr.io/masonjames/ntfy@$IMAGE_DIGEST" >> "$GITHUB_OUTPUT"

      - name: Sign build provenance attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/masonjames/ntfy
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Verify build provenance attestation
        env:
          GH_TOKEN: ${{ github.token }}
          IMMUTABLE_IMAGE: ${{ steps.immutable.outputs.image }}
        run: |
          set -euo pipefail
          gh attestation verify "oci://${IMMUTABLE_IMAGE}" \
            --repo "$GITHUB_REPOSITORY" \
            --format json > provenance-verification.json
          jq -e 'length > 0' provenance-verification.json >/dev/null

      - name: Enforce critical vulnerability threshold
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.immutable.outputs.image }}
          scan-type: image
          scanners: vuln
          vuln-type: os,library
          format: table
          output: trivy-image-gate.txt
          severity: CRITICAL
          exit-code: '1'

      - name: Upload candidate security evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ntfy-candidate-security-${{ steps.source.outputs.sha }}
          path: |
            trivy-image-gate.txt
            provenance-verification.json
          if-no-files-found: warn
          retention-days: 90

      - name: Summarize immutable candidate
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          IMMUTABLE_IMAGE: ${{ steps.immutable.outputs.image }}
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
        run: |
          {
            echo '## ntfy immutable candidate'
            echo
            echo "- Source: $SOURCE_SHA"
            echo "- Digest: $IMAGE_DIGEST"
            echo "- Image: $IMMUTABLE_IMAGE"
            echo '- Mutable latest tag: not published'
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    name: Verified production promotion
    needs: build
    if: >-
      (github.event_name == 'schedule' && vars.NTFY_AUTO_DEPLOY_ENABLED == 'true') ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      eligible: ${{ steps.window.outputs.eligible }}
    steps:
      - name: Enforce the routine maintenance window
        id: window
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "eligible=true" >> "$GITHUB_OUTPUT"
            echo "Explicit dispatch authorized an out-of-window security release."
            exit 0
          fi

          local_slot=$(TZ=America/New_York date +%u-%H%M)
          if [[ "$local_slot" =~ ^7-03[0-5][0-9]$ ]]; then
            echo "eligible=true" >> "$GITHUB_OUTPUT"
            echo "Routine Sunday maintenance slot: $local_slot America/New_York"
          else
            echo "eligible=false" >> "$GITHUB_OUTPUT"
            echo "Skipping duplicate UTC schedule outside the 03:00 local hour: $local_slot"
          fi

      - name: Create narrow platform dispatch token
        id: platform
        if: steps.window.outputs.eligible == 'true'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: masonjames
          repositories: platform-infra
          permission-actions: write
          permission-contents: read

      - name: Dispatch platform-owned release and wait for verification
        if: steps.window.outputs.eligible == 'true'
        env:
          GH_TOKEN: ${{ steps.platform.outputs.token }}
          CANDIDATE_IMAGE: ${{ needs.build.outputs.immutable_image }}
          SOURCE_SHA: ${{ needs.build.outputs.source_sha }}
          CALLER_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          [[ "$CANDIDATE_IMAGE" =~ ^ghcr\.io/masonjames/ntfy@sha256:[0-9a-f]{64}$ ]]
          [[ "$SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]]
          dispatch_started=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          gh workflow run ntfy-release.yml \
            --repo masonjames/platform-infra \
            --ref main \
            -f candidate_image="$CANDIDATE_IMAGE" \
            -f source_sha="$SOURCE_SHA" \
            -f caller_run_url="$CALLER_RUN_URL"

          platform_run=""
          for _ in $(seq 1 30); do
            platform_run=$(gh run list \
              --repo masonjames/platform-infra \
              --workflow ntfy-release.yml \
              --event workflow_dispatch \
              --limit 20 \
              --json databaseId,displayTitle,createdAt,url \
              | jq -c \
                --arg title "ntfy $SOURCE_SHA" \
                --arg started "$dispatch_started" \
                '[.[] | select(.displayTitle == $title and .createdAt >= $started)] | first // empty')
            [ -n "$platform_run" ] && break
            sleep 2
          done
          if [ -z "$platform_run" ]; then
            echo "::error::The platform release run was not discoverable after dispatch."
            exit 1
          fi

          platform_run_id=$(jq -r .databaseId <<< "$platform_run")
          platform_run_url=$(jq -r .url <<< "$platform_run")
          jq -n \
            --arg candidate_image "$CANDIDATE_IMAGE" \
            --arg source_sha "$SOURCE_SHA" \
            --arg caller_run_url "$CALLER_RUN_URL" \
            --arg platform_run_url "$platform_run_url" \
            '{candidate_image:$candidate_image,source_sha:$source_sha,caller_run_url:$caller_run_url,platform_run_url:$platform_run_url}' \
            > ntfy-release-evidence.jsonl
          gh run watch "$platform_run_id" \
            --repo masonjames/platform-infra \
            --exit-status \
            --interval 10

      - name: Upload deployment evidence
        if: always() && steps.window.outputs.eligible == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ntfy-deployment-${{ needs.build.outputs.source_sha }}
          path: ntfy-release-evidence.jsonl
          if-no-files-found: warn
          retention-days: 90

  report-failure:
    name: Create or update maintenance failure issue
    needs: [build, deploy]
    if: >-
      always() &&
      (needs.build.result == 'failure' || needs.deploy.result == 'failure')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Record assigned deduplicated issue
        env:
          GH_TOKEN: ${{ github.token }}
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          CANDIDATE_IMAGE: ${{ needs.build.outputs.immutable_image }}
          SOURCE_SHA: ${{ github.sha }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          for spec in \
            'automated-maintenance|1d76db|Created by automated maintenance' \
            'deployment-rollback|d93f0b|Deployment failed and rollback was attempted' \
            'service:ntfy|0052cc|ntfy notification service lifecycle' \
            'severity:high|d93f0b|High-priority maintenance failure'; do
            IFS='|' read -r name color description <<< "$spec"
            gh label create "$name" --repo "$GITHUB_REPOSITORY" \
              --color "$color" --description "$description" --force
          done

          if [ "$BUILD_RESULT" = "failure" ]; then
            failure_stage=build
          else
            failure_stage=deploy
          fi
          title="Automated ntfy ${failure_stage} failure: ${SOURCE_SHA:0:12}"
          body=$(printf '%s\n' \
            'The immutable ntfy release workflow failed and requires Mason review.' \
            '' \
            "- Source: $SOURCE_SHA" \
            "- Candidate: ${CANDIDATE_IMAGE:-unavailable}" \
            "- Failure stage: $failure_stage" \
            "- Build result: $BUILD_RESULT" \
            "- Deploy result: $DEPLOY_RESULT" \
            "- Evidence: $WORKFLOW_URL" \
            '' \
            'The host actuator restores the prior Compose file and both stopped-volume archives when mutation has begun. Verify the workflow artifact and /var/lib/ntfy-release/evidence/ before closing.')
          existing=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open \
            --search "$title in:title" --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$GITHUB_REPOSITORY" --body "$body"
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --title "$title" --body "$body" \
              --assignee masonjames \
              --label automated-maintenance \
              --label deployment-rollback \
              --label service:ntfy \
              --label severity:high
          fi

  comment-on-prior-failures:
    name: Record later success without auto-closing issues
    needs: [build, deploy]
    if: needs.build.result == 'success' && needs.deploy.result == 'success' && needs.deploy.outputs.eligible == 'true'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Comment on open rollback issues
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_SHA: ${{ github.sha }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          gh issue list --repo "$GITHUB_REPOSITORY" --state open \
            --label deployment-rollback --label service:ntfy \
            --json number --jq '.[].number' | while read -r issue; do
              gh issue comment "$issue" --repo "$GITHUB_REPOSITORY" \
                --body "A later release of \`${SOURCE_SHA}\` completed successfully: ${WORKFLOW_URL}. This issue remains open for Mason review."
            done
